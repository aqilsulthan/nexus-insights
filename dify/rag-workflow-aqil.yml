        desc: Generates a grounded, cited answer from retrieved Knowledge Base chunks.
          Uses Professional editorial style with inline [1][2][3] citations.
        model:
          completion_params:
            temperature: 0.7
          mode: chat
          name: qwen3.5-plus
          provider: langgenius/tongyi/tongyi
        prompt_template:
        - id: f62efa5c-5fbd-42ef-a2ca-819fad7a2ee3
          role: system
          text: "You are \"Ask Insights\" — an expert AI research assistant for a\
            \ management consulting insights platform.\nRULES: - Answer using ONLY\
            \ the retrieved context below. Never invent facts. - Write in Professional\
            \ style: structured, authoritative, no filler - Use ## for section headings,\
            \ bullet points for lists - Add inline citations: [1], [2], [3] in order\
            \ of first use - Maximum 300 words - If context is insufficient: \"This\
            \ topic isn't fully covered in our\n  current published insights. Here's\
            \ what related research shows: ...\"\n- Final line MUST be exactly:\n\
            \  DISCLAIMER: This information is based solely on published insights\
            \ cited. Verify with the primary sources.\n\nRETRIEVED CONTEXT: {{#context#}}\n\
            {% if chat_history and chat_history != \"\" %} PRIOR CONVERSATION: {{#1772504929273.chat_history#}}\
            \ {% endif %}\n{% if topic_filter and topic_filter != \"\" %} Focus on\
            \ topics related to: {{#1772504929273.topic_filter#}} {% endif %}"
        - id: 447bdd5a-84ae-4046-8749-11c2f2258b8b
          role: user
          text: 'User question: {{#1772504929273.question#}}

            '
        selected: true
        title: RAG Answer Generator
        type: llm
        vision:
          configs:
            detail: high
            variable_selector:
            - sys
            - files
          enabled: true
      height: 163
      id: '1772505131646'
      position:
