        y: 282
      positionAbsolute:
        x: 684
        y: 282
      selected: true
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "import json\nimport re\n\ndef main(knowledge_result: list, llm_answer:\
          \ str) -> dict:\n    \"\"\"\n    Deduplicates retrieved chunks by source\
          \ document and builds\n    structured reference cards: blog / video / document.\n\
          \    \"\"\"\n    seen = set()\n    references = []\n\n    for chunk in (knowledge_result\
          \ or []):\n        doc_name = chunk.get(\"title\") or chunk.get(\"document_name\"\
          ) or \"\"\n        if doc_name in seen:\n            continue\n        seen.add(doc_name)\n\
          \n        name_lower = doc_name.lower()\n        if any(name_lower.endswith(e)\
          \ for e in [\".mp4\", \".webm\", \".srt\", \".vtt\"]) or \"video\" in name_lower:\n\
          \            ref_type = \"video\"\n        elif any(name_lower.endswith(e)\
          \ for e in [\".pdf\", \".docx\", \".xlsx\"]) or any(\n            w in name_lower\
          \ for w in [\"report\", \"guide\", \"brief\", \"whitepaper\"]\n        ):\n\
          \            ref_type = \"document\"\n        else:\n            ref_type\
          \ = \"blog\"\n\n        meta = chunk.get(\"metadata\") or {}\n        score\
          \ = chunk.get(\"score\", 0)\n\n        references.append({\n           \
          \ \"type\": ref_type,\n            \"id\": chunk.get(\"id\", doc_name),\n\
          \            \"title\": doc_name.rsplit(\".\", 1)[0] if \".\" in doc_name\
          \ else doc_name,\n            \"url\": meta.get(\"url\", \"\"),\n      \
          \      \"meta\": (\n                meta.get(\"duration\", \"Video\") if\
          \ ref_type == \"video\"\n                else f\"{meta.get('pages', chunk.get('word_count',\
          \ 0))} {'pages' if meta.get('pages') else 'words'} · {ref_type.capitalize()}\"\
          \n                if ref_type == \"document\" else meta.get(\"date\", \"\
          Article\")\n            ),\n            \"topic\": meta.get(\"topic\", \"\
          \"),\n            \"score\": round(score, 3),\n        })\n\n    # Strip\
          \ disclaimer from answer for clean return\n    disclaimer_match = re.search(r\"\
          DISCLAIMER:.*$\", llm_answer, re.MULTILINE)\n    disclaimer = disclaimer_match.group(0)\
          \ if disclaimer_match else (\n        \"DISCLAIMER: This information is\
          \ based solely on published insights cited. \"\n        \"Verify with the\
          \ primary sources.\"\n    )\n    clean_answer = re.sub(r\"DISCLAIMER:.*$\"\
          , \"\", llm_answer, flags=re.MULTILINE).strip()\n\n    return {\n      \
          \  \"answer\": clean_answer,\n        \"disclaimer\": disclaimer,\n    \
          \    \"references\": json.dumps(references),\n        \"retrieved_count\"\
          : len(knowledge_result or []),\n    }\n"
        code_language: python3
        desc: Formats retrieved chunks into typed reference cards and cleans the answer
          by extracting the disclaimer separately.
        outputs:
          answer:
            children: null
            type: string
          disclaimer:
            children: null
            type: string
          references:
            children: null
            type: string
          retrieved_count:
            children: null
            type: number
        selected: false
        title: Reference Formatter
        type: code
        variables:
        - value_selector:
          - '1772505096154'
          - result
          value_type: array[object]
          variable: knowledge_result
        - value_selector:
