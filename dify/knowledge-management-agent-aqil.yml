      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "import json\n\ndef main(\n    new_blog_output: str,\n    update_output:\
          \ str,\n    classifier_output: str,\n    author_name: str,\n    file_name:\
          \ str\n) -> dict:\n    \"\"\"\n    Merges whichever generator ran (new or\
          \ update),\n    cleans the JSON, adds metadata, and returns the\n    final\
          \ payload that the Next.js API will consume.\n    \"\"\"\n    import datetime\n\
          \n    # Parse classifier to get word count\n    try:\n        classifier\
          \ = json.loads(classifier_output)\n        word_count = classifier.get(\"\
          word_count\", 0)\n        file_type = classifier.get(\"file_type\", \"document\"\
          )\n    except Exception:\n        word_count = 0\n        file_type = \"\
          document\"\n\n    # Prefer whichever generator produced output\n    raw\
          \ = new_blog_output if new_blog_output and len(new_blog_output) > 10 else\
          \ update_output\n\n    # Strip markdown code fences if the LLM wrapped the\
          \ JSON\n    raw = raw.strip()\n    if raw.startswith(\"```\"):\n       \
          \ raw = raw.split(\"```\")[1]\n        if raw.startswith(\"json\"):\n  \
          \          raw = raw[4:]\n    raw = raw.strip().rstrip(\"```\").strip()\n\
          \n    try:\n        article = json.loads(raw)\n    except json.JSONDecodeError\
          \ as e:\n        return {\n            \"success\": False,\n           \
          \ \"error\": f\"JSON parse error: {str(e)}\",\n            \"raw\": raw[:500],\n\
          \            \"article\": None,\n            \"kb_text\": None,\n      \
          \  }\n\n    # Add runtime metadata\n    article[\"created_at\"] = datetime.datetime.utcnow().isoformat()\
          \ + \"Z\"\n    article[\"source_file\"] = file_name\n    article[\"source_file_type\"\
          ] = file_type\n    article[\"word_count\"] = word_count\n    article[\"\
          author\"] = article.get(\"author\") or author_name or \"Insights Editorial\"\
          \n\n    # Derive hero color from action\n    if not article.get(\"hero_color\"\
          ):\n        article[\"hero_color\"] = \"#1B40A0\" if article.get(\"action\"\
          ) == \"create\" else \"#0D2160\"\n\n    # Ensure slug is URL-safe\n    slug\
          \ = article.get(\"slug\", \"\")\n    slug = slug.lower().replace(\" \",\
          \ \"-\").replace(\"_\", \"-\")\n    import re\n    slug = re.sub(r\"[^a-z0-9-]\"\
          , \"\", slug)\n    article[\"slug\"] = slug\n\n    # Extract kb_text for\
          \ knowledge base indexing\n    kb_text = article.pop(\"kb_text\", \"\")\
          \ or \"\"\n    if not kb_text and article.get(\"content_html\"):\n     \
          \   # Fallback: strip HTML tags\n        html = article[\"content_html\"\
          ]\n        kb_text = re.sub(r\"<[^>]+>\", \" \", html).strip()\n       \
          \ kb_text = re.sub(r\"\\s+\", \" \", kb_text)\n\n    # Build final response\
          \ payload\n    return {\n        \"success\": True,\n        \"error\":\
          \ None,\n        \"article\": json.dumps(article),\n        \"kb_text\"\
          : kb_text,\n        \"action\": article.get(\"action\", \"create\"),\n \
          \       \"slug\": article.get(\"slug\", \"\"),\n        \"title\": article.get(\"\
          title\", \"\"),\n        \"version\": article.get(\"version\", \"1.0\"),\n\
          \    }\n"
        code_language: python3
        desc: Merges the generator outputs, sanitizes the JSON, enriches with metadata,
          extracts plain text for KB indexing, and returns the final structured payload
          to the End node.
        outputs:
          action:
            children: null
            type: string
          article:
