            : \"1.0\",\n  \"version_notes\": null\n}"
        - id: 7eecb93d-9276-4bb1-8009-98008598db64
          role: user
          text: "Author: {{#1772503013783.author_name#}}\nAuthor Role: {{#1772503013783.author_role#}}\
            \ \nToday's date: {{#sys.date#}}\nExtracted content to transform into\
            \ a blog article: {{#1772503887376.text#}}\nWrite the complete blog article\
            \ and return as JSON."
        selected: false
        title: New Blog Generator
        type: llm
        vision:
          enabled: false
      height: 179
      id: '1772504158924'
      position:
        x: 1606
