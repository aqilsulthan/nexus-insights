    - data:
        context:
          enabled: false
          variable_selector: []
        desc: Generates an updated version of an existing blog article. Preserves
          the original structure but incorporates new data, findings, and insights.
          Increments the version number and adds version notes.
        model:
          completion_params:
            temperature: 0.7
          mode: chat
          name: qwen3.5-plus
          provider: langgenius/tongyi/tongyi
        prompt_template:
        - id: c07c6d38-0fae-4d21-a496-6f9d02f95a7e
          role: system
          text: "You are a senior editor updating an existing research article with\
            \ new findings. Your task is to create an updated version that:\n1. Preserves\
            \ the article's core structure and identity 2. Incorporates all new data,\
            \ statistics, and insights from the new document 3. Updates outdated figures\
            \ with current ones 4. Adds a \"What's New\" section at the top highlighting\
            \ changes 5. Increments the version (1.0 → 2.0, or 1.1 → 1.2 for minor\
            \ updates) 6. Writes version notes explaining what changed\nStyle: Professional\
            \ editorial — clear, authoritative, data-driven. Use the same HTML formatting\
            \ conventions.\nOutput ONLY valid JSON with this exact structure: {\n\
            \  \"action\": \"update\",\n  \"slug\": \"existing-slug-here\",\n  \"\
            title\": \"Updated Article Title\",\n  \"subtitle\": \"Updated subtitle\
            \ reflecting new findings\",\n  \"category\": \"Category Name\",\n  \"\
            excerpt\": \"Updated 2-3 sentence excerpt\",\n  \"author\": \"Author Name\"\
            ,\n  \"author_role\": \"Author Role\",\n  \"hero_color\": \"#0D2160\"\
            ,\n  \"read_time\": \"X min read\",\n  \"tags\": [\"tag1\", \"tag2\"],\n\
            \  \"stats\": [{\"number\": \"92%\", \"label\": \"description\"}],\n \
            \ \"content_html\": \"<div class='version-callout'><strong>Updated:</strong>\
            \ ...</div><h2>What's New in This Version</h2><p>...</p><h2>Section</h2><p>...</p>\"\
            ,\n  \"kb_text\": \"Plain text for knowledge base. All updated key points,\
            \ new stats, and insights.\",\n  \"version\": \"2.0\",\n  \"version_notes\"\
            : \"Updated with 2025 data. New section on X. Revised statistics for Y.\"\
            \n}"
        - id: 36635ea1-6986-4e5e-9cac-fda168f7d974
          role: user
          text: "Author: {{#1772503013783.author_name#}}\nAuthor Role: {{#1772503013783.author_role#}}\
            \ \nExisting article slug to update:  {{#1772504009862.text#}}\nToday's\
            \ date: {{#sys.date#}}\nExisting articles context (find the one matching\
            \ the slug above): {{#1772503013783.existing_contents_json#}}\nNew content\
            \ to incorporate: {{#1772503887376.text#}}\nInstructions: - Find the matching\
            \ article from existing_contents_json using the slug - Preserve the article's\
            \ core identity and structure - Incorporate all new data and insights\
            \ from the new content - Add a \"What's New in Version X.0\" section at\
            \ the top of the body - Update outdated statistics with new figures -\
            \ Increment version number (1.0 → 2.0, minor update → add 0.1) - Write\
            \ version_notes summarizing what changed (max 100 chars) - Generate the\
            \ updated article and return as JSON."
        selected: false
        title: Update Generator
        type: llm
        vision:
          enabled: false
      height: 195
      id: '1772504232773'
      position:
