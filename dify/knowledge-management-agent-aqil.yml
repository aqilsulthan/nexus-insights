            >X%</div><p>Label</p></div>\n  for compelling statistics\n- No fluff,\
            \ no hedging — every sentence must add value - Write 600-900 words of\
            \ body content\nOutput ONLY valid JSON with this exact structure: {\n\
            \  \"action\": \"create\",\n  \"slug\": \"topic-slug-here\",\n  \"title\"\
            : \"Article Title\",\n  \"subtitle\": \"One compelling sentence subtitle\"\
            ,\n  \"category\": \"Category Name\",\n  \"excerpt\": \"2-3 sentence excerpt\"\
            ,\n  \"author\": \"Author Name\",\n  \"author_role\": \"Author Role\"\
            ,\n  \"hero_color\": \"#1B40A0\",\n  \"read_time\": \"X min read\",\n\
            \  \"tags\": [\"tag1\", \"tag2\"],\n  \"stats\": [{\"number\": \"92%\"\
            , \"label\": \"description\"}],\n  \"content_html\": \"<h2>Section</h2><p>...</p>\"\
            ,\n  \"kb_text\": \"Plain text version for knowledge base indexing. All\
