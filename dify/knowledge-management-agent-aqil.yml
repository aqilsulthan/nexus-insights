            \ — brief explanation of why you think it matches\n   (or \"No match found\"\
            \ if new)\n\nMatching rules: - Exact slug match → always is_new_topic:\
            \ false - Same core subject with different year/date → is_new_topic: false\
            \ (it's an update) - Same general theme but distinctly different angle\
            \ → is_new_topic: true - When in doubt → is_new_topic: true (prefer creating\
            \ new)\nOutput ONLY valid JSON: {\n  \"is_new_topic\": true,\n  \"matching_slug\"\
            : null,\n  \"similarity_reason\": \"No match found\"\n}"
